<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- OPTION 1: Bold JJW Monogram with Contrail
       Concept: Clean geometric "JJW" letterforms in terracotta on cream.
       A single sweeping contrail line arcs from the W upward, implying flight.
       Confident, typographic, minimal. -->

  <rect width="512" height="512" rx="64" fill="#FAF7F2"/>

  <g transform="translate(56, 140)">
    <!-- First J -->
    <rect x="0" y="0" width="40" height="36" rx="2" fill="#C2532E"/>
    <rect x="16" y="0" width="40" height="190" rx="2" fill="#C2532E"/>
    <path d="M56,190 C56,230 40,250 16,250 C-8,250 -16,235 -16,215"
          fill="none" stroke="#C2532E" stroke-width="36" stroke-linecap="round"/>

    <!-- Second J -->
    <rect x="110" y="0" width="40" height="36" rx="2" fill="#C2532E"/>
    <rect x="126" y="0" width="40" height="190" rx="2" fill="#C2532E"/>
    <path d="M166,190 C166,230 150,250 126,250 C102,250 94,235 94,215"
          fill="none" stroke="#C2532E" stroke-width="36" stroke-linecap="round"/>

    <!-- W -->
    <polygon points="220,0 248,232 280,100 312,232 340,0 380,0 328,250 272,250 248,150 224,250 168,250 220,0"
             fill="#C2532E"/>

    <!-- Contrail: sweeping arc from top of W upward-right -->
    <path d="M340,10 C360,-10 380,-20 400,-18"
          fill="none" stroke="#C2532E" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <path d="M395,-19 C405,-18 410,-16 400,-18"
          fill="none" stroke="#C2532E" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <!-- Small paper airplane at end of contrail -->
    <polygon points="400,-22 416,-30 404,-14" fill="#C2532E" opacity="0.7"/>
  </g>
</svg>
