<!DOCTYPE html>
<html>
<head><title>Favicon Size Check</title>
<style>
body { font-family: -apple-system, sans-serif; background: #f5f5f5; padding: 3rem; }
.row { display: flex; align-items: center; gap: 2rem; margin-bottom: 2rem; }
.size { text-align: center; }
.dim { font-size: 0.75rem; color: #999; margin-top: 4px; }
.tab-sim { display: flex; align-items: center; gap: 8px; background: #dee1e6; padding: 8px 16px; border-radius: 8px 8px 0 0; font-size: 13px; color: #333; }
.tab-sim img { width: 16px; height: 16px; }
.browser-bar { display: flex; align-items: center; gap: 8px; background: #fff; padding: 8px 12px; border-radius: 6px; font-size: 13px; color: #666; max-width: 400px; margin-top: 4px; }
.browser-bar img { width: 16px; height: 16px; }
</style>
</head>
<body>
<h2>JJW Favicon — Size Check</h2>
<div class="row">
  <div class="size"><img src="/favicon.svg" width="128" height="128"><div class="dim">128px</div></div>
  <div class="size"><img src="/favicon.svg" width="64" height="64"><div class="dim">64px</div></div>
  <div class="size"><img src="/favicon.svg" width="32" height="32"><div class="dim">32px</div></div>
  <div class="size"><img src="/favicon.svg" width="16" height="16"><div class="dim">16px</div></div>
</div>
<h3>Browser tab simulation</h3>
<div class="tab-sim"><img src="/favicon.svg"> Jesse James Woods — VP, SEO & Localization</div>
<div class="browser-bar"><img src="/favicon.svg"> jessejameswoods.com</div>
</body>
</html>
